<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">Fitness AI</div>
            <nav>
                <ul>
                    <li class="active" onclick="showSection('chat-section')">Chat Coach</li>
                    <li onclick="showSection('dashboard-section')">Progress Dashboard</li>
                    <li onclick="showSection('history-section')">History Logs</li>
                </ul>
            </nav>
            <div class="session-history">
                <h3>Previous Chats</h3>
                <ul id="session-list">
                    <!-- Sessions will be loaded here -->
                </ul>
            </div>
        </aside>
        
        <main class="content">
            <section id="chat-section" class="active-section">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>Chat Coach</h2>
                        <button onclick="newChat()" class="new-chat-btn">New Chat</button>
                    </div>
                    <div id="chat-box" class="chat-box"></div>
                    <div class="input-area">
                        <input type="text" id="user-input" placeholder="Ask your coach anything...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </section>
            
            <section id="dashboard-section" style="display:none;">
                <h2>Your Progress</h2>
                <div class="chart-controls">
                    <button onclick="loadChart('weight')">Weight Trend</button>
                    <button onclick="loadChart('heart_rate')">Heart Rate</button>
                    <button onclick="loadChart('sleep')">Sleep</button>
                </div>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </section>

            <section id="history-section" style="display:none;">
                <h2>History</h2>
                <div class="history-controls">
                    <button onclick="loadHistory('workout')">Workouts</button>
                    <button onclick="loadHistory('nutrition')">Nutrition</button>
                </div>
                <div id="history-list" class="history-list"></div>
            </section>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
